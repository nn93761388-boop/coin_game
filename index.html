<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接金幣躲炸彈</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #87ceeb 0%, #dff6ff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .game-wrap {
      width: 100%;
      max-width: 900px;
    }

    .title {
      text-align: center;
      color: #1f2937;
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 700;
    }

    .panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .stat {
      font-size: 18px;
      color: #111827;
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    button:active {
      transform: scale(0.98);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(180deg, #b9e6ff 0%, #e8fff3 100%);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
      border: 3px solid rgba(255,255,255,0.8);
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      color: #374151;
      font-size: 15px;
      line-height: 1.6;
      background: rgba(255,255,255,0.7);
      padding: 10px 14px;
      border-radius: 12px;
    }

    .mobile-controls {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .mobile-controls button {
      padding: 14px 0;
      font-size: 20px;
      background: #0f766e;
    }

    @media (max-width: 640px) {
      .title {
        font-size: 24px;
      }

      .stat {
        font-size: 16px;
      }

      .mobile-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="title">🎮 接金幣躲炸彈</div>

    <div class="panel">
      <div class="stat">分數：<span id="score">0</span></div>
      <div class="stat">血量：<span id="lives">3</span></div>
      <div class="stat">難度：<span id="level">1</span></div>
      <div class="controls">
        <button id="startBtn">開始遊戲</button>
        <button id="restartBtn">重新開始</button>
      </div>
    </div>

    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div class="mobile-controls">
      <button id="leftBtn">⬅ 左移</button>
      <button id="rightBtn">右移 ➡</button>
    </div>

    <div class="hint">
      操作方式：使用鍵盤 <strong>← →</strong> 或 <strong>A / D</strong> 移動籃子。<br />
      接到金幣可得分，碰到炸彈會扣血。
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const levelEl = document.getElementById("level");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    let gameRunning = false;
    let animationId = null;
    let score = 0;
    let lives = 3;
    let level = 1;
    let spawnTimer = 0;

    const keys = {
      left: false,
      right: false
    };

    const player = {
      x: canvas.width / 2 - 45,
      y: canvas.height - 55,
      width: 90,
      height: 30,
      speed: 8
    };

    const items = [];

    function resetGame() {
      score = 0;
      lives = 3;
      level = 1;
      spawnTimer = 0;
      items.length = 0;
      player.x = canvas.width / 2 - player.width / 2;
      updateUI();
      draw();
    }

    function updateUI() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      levelEl.textContent = level;
    }

    function spawnItem() {
      const isBomb = Math.random() < Math.min(0.18 + level * 0.02, 0.4);
      const radius = isBomb ? 16 : 14;
      items.push({
        x: Math.random() * (canvas.width - radius * 2) + radius,
        y: -20,
        radius,
        speed: 2 + Math.random() * 2 + level * 0.5,
        type: isBomb ? "bomb" : "coin",
        rotation: Math.random() * Math.PI * 2
      });
    }

    function drawBackground() {
      ctx.save();

      ctx.fillStyle = "#7dd3fc";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      drawCloud(120, 80, 1);
      drawCloud(320, 130, 0.8);
      drawCloud(700, 90, 1.1);

      ctx.fillStyle = "#86efac";
      ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

      ctx.restore();
    }

    function drawCloud(x, y, scale) {
      ctx.beginPath();
      ctx.arc(x, y, 22 * scale, 0, Math.PI * 2);
      ctx.arc(x + 22 * scale, y - 10 * scale, 28 * scale, 0, Math.PI * 2);
      ctx.arc(x + 52 * scale, y, 24 * scale, 0, Math.PI * 2);
      ctx.arc(x + 28 * scale, y + 10 * scale, 26 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPlayer() {
      ctx.save();

      ctx.fillStyle = "#92400e";
      ctx.fillRect(player.x, player.y, player.width, player.height);

      ctx.fillStyle = "#b45309";
      ctx.fillRect(player.x + 8, player.y - 8, player.width - 16, 10);

      ctx.strokeStyle = "#5b3716";
      ctx.lineWidth = 2;
      ctx.strokeRect(player.x, player.y, player.width, player.height);

      ctx.restore();
    }

    function drawCoin(item) {
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.rotation);

      ctx.beginPath();
      ctx.fillStyle = "#facc15";
      ctx.arc(0, 0, item.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.strokeStyle = "#eab308";
      ctx.lineWidth = 4;
      ctx.arc(0, 0, item.radius - 3, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#a16207";
      ctx.font = "bold 16px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("$", 0, 1);

      ctx.restore();
    }

    function drawBomb(item) {
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.rotation);

      ctx.beginPath();
      ctx.fillStyle = "#1f2937";
      ctx.arc(0, 0, item.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#6b7280";
      ctx.fillRect(-4, -item.radius - 6, 8, 10);

      ctx.beginPath();
      ctx.strokeStyle = "#f59e0b";
      ctx.lineWidth = 3;
      ctx.moveTo(0, -item.radius - 6);
      ctx.quadraticCurveTo(8, -item.radius - 16, 14, -item.radius - 10);
      ctx.stroke();

      ctx.beginPath();
      ctx.fillStyle = "#ef4444";
      ctx.arc(16, -item.radius - 10, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawItems() {
      for (const item of items) {
        if (item.type === "coin") {
          drawCoin(item);
        } else {
          drawBomb(item);
        }
      }
    }

    function movePlayer() {
      if (keys.left) {
        player.x -= player.speed;
      }
      if (keys.right) {
        player.x += player.speed;
      }

      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }
    }

    function checkCollisions() {
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];

        const closestX = Math.max(player.x, Math.min(item.x, player.x + player.width));
        const closestY = Math.max(player.y, Math.min(item.y, player.y + player.height));
        const dx = item.x - closestX;
        const dy = item.y - closestY;

        if (dx * dx + dy * dy < item.radius * item.radius) {
          if (item.type === "coin") {
            score += 10;
            if (score % 100 === 0) {
              level++;
            }
          } else {
            lives--;
          }
          items.splice(i, 1);
          updateUI();

          if (lives <= 0) {
            endGame();
            return;
          }
        }
      }
    }

    function updateItems() {
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.speed;
        item.rotation += 0.05;

        if (item.y - item.radius > canvas.height) {
          items.splice(i, 1);
        }
      }
    }

    function drawOverlay(text, subtext = "") {
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "bold 48px Arial";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 10);

      if (subtext) {
        ctx.font = "24px Arial";
        ctx.fillText(subtext, canvas.width / 2, canvas.height / 2 + 35);
      }
      ctx.restore();
    }

    function draw() {
      drawBackground();
      drawPlayer();
      drawItems();

      if (!gameRunning && lives > 0 && score === 0 && items.length === 0) {
        drawOverlay("按下開始遊戲", "接金幣、躲炸彈！");
      }
    }

    function gameLoop() {
      drawBackground();

      movePlayer();

      spawnTimer++;
      const spawnInterval = Math.max(45 - level * 3, 18);
      if (spawnTimer >= spawnInterval) {
        spawnItem();
        spawnTimer = 0;
      }

      updateItems();
      checkCollisions();

      drawPlayer();
      drawItems();

      if (gameRunning) {
        animationId = requestAnimationFrame(gameLoop);
      }
    }

    function startGame() {
      if (gameRunning) return;
      gameRunning = true;
      animationId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameRunning = false;
      cancelAnimationFrame(animationId);
      drawBackground();
      drawPlayer();
      drawItems();
      drawOverlay("遊戲結束", `你的分數：${score}`);
    }

    startBtn.addEventListener("click", () => {
      startGame();
    });

    restartBtn.addEventListener("click", () => {
      cancelAnimationFrame(animationId);
      gameRunning = false;
      resetGame();
    });

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "arrowleft" || key === "a") keys.left = true;
      if (key === "arrowright" || key === "d") keys.right = true;
    });

    document.addEventListener("keyup", (e) => {
      const key = e.key.toLowerCase();
      if (key === "arrowleft" || key === "a") keys.left = false;
      if (key === "arrowright" || key === "d") keys.right = false;
    });

    function bindHoldButton(button, direction) {
      const press = (e) => {
        e.preventDefault();
        keys[direction] = true;
      };
      const release = (e) => {
        e.preventDefault();
        keys[direction] = false;
      };

      button.addEventListener("touchstart", press, { passive: false });
      button.addEventListener("touchend", release, { passive: false });
      button.addEventListener("touchcancel", release, { passive: false });
      button.addEventListener("mousedown", press);
      button.addEventListener("mouseup", release);
      button.addEventListener("mouseleave", release);
    }

    bindHoldButton(leftBtn, "left");
    bindHoldButton(rightBtn, "right");

    resetGame();
  </script>
</body>
</html>
